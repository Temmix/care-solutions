name: Deploy (ECS)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: eu-west-2
  ECS_CLUSTER: care-solutions-minimal
  API_SERVICE: care-solutions-minimal-api
  WEB_SERVICE: care-solutions-minimal-web

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - run: npm run format:check

      - run: npm run build -w packages/shared
      - run: npm run build -w apps/logger

      - run: npx prisma generate
        working-directory: apps/api

      - run: npm run lint

      - run: npm test -w apps/api -- --ci
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - run: npm test -w apps/web -- --reporter=verbose

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      api_image: ${{ steps.images.outputs.api }}
      web_image: ${{ steps.images.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URLs
        id: images
        run: |
          echo "api=${{ steps.ecr.outputs.registry }}/care-solutions/care-api:${{ steps.meta.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "web=${{ steps.ecr.outputs.registry }}/care-solutions/care-web:${{ steps.meta.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.web }}

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current API task definition
        id: taskdef
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_CLUSTER }}-api --query 'taskDefinition' --output json)
          echo "execution_role=$(echo "$TASK_DEF" | jq -r '.executionRoleArn')" >> $GITHUB_OUTPUT
          echo "task_role=$(echo "$TASK_DEF" | jq -r '.taskRoleArn')" >> $GITHUB_OUTPUT
          SUBNETS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.API_SERVICE }} --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' --output json | jq -c '.')
          echo "subnets=$SUBNETS" >> $GITHUB_OUTPUT
          SECURITY_GROUPS=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.API_SERVICE }} --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' --output json | jq -c '.')
          echo "security_groups=$SECURITY_GROUPS" >> $GITHUB_OUTPUT
          echo "log_group=$(echo "$TASK_DEF" | jq -r '.containerDefinitions[0].logConfiguration.options["awslogs-group"]')" >> $GITHUB_OUTPUT
          echo "secrets=$(echo "$TASK_DEF" | jq -c '[.containerDefinitions[0].secrets[] | select(.name == "DATABASE_URL")]')" >> $GITHUB_OUTPUT

      - name: Register migration task definition
        id: migrate_taskdef
        run: |
          TASK_DEF=$(cat <<HEREDOC
          {
            "family": "${{ env.ECS_CLUSTER }}-migrate",
            "requiresCompatibilities": ["FARGATE"],
            "networkMode": "awsvpc",
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "${{ steps.taskdef.outputs.execution_role }}",
            "taskRoleArn": "${{ steps.taskdef.outputs.task_role }}",
            "containerDefinitions": [{
              "name": "migrate",
              "image": "${{ needs.build-and-push.outputs.api_image }}",
              "essential": true,
              "command": ["npx", "prisma", "migrate", "deploy", "--schema", "apps/api/prisma/schema.prisma"],
              "environment": [
                { "name": "NODE_ENV", "value": "production" }
              ],
              "secrets": ${{ steps.taskdef.outputs.secrets }},
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "${{ steps.taskdef.outputs.log_group }}",
                  "awslogs-region": "${{ env.AWS_REGION }}",
                  "awslogs-stream-prefix": "migrate"
                }
              }
            }]
          }
          HEREDOC
          )
          ARN=$(aws ecs register-task-definition --cli-input-json "$TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Run migration task
        id: run_migrate
        run: |
          RESULT=$(aws ecs run-task \
            --cluster ${{ env.ECS_CLUSTER }} \
            --task-definition ${{ steps.migrate_taskdef.outputs.arn }} \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=${{ steps.taskdef.outputs.subnets }},securityGroups=${{ steps.taskdef.outputs.security_groups }},assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' --output text)
          echo "task_arn=$RESULT" >> $GITHUB_OUTPUT
          echo "Migration task started: $RESULT"

      - name: Wait for migration to complete
        run: |
          echo "Waiting for migration task to finish..."
          aws ecs wait tasks-stopped --cluster ${{ env.ECS_CLUSTER }} --tasks ${{ steps.run_migrate.outputs.task_arn }}

          EXIT_CODE=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks ${{ steps.run_migrate.outputs.task_arn }} \
            --query 'tasks[0].containers[0].exitCode' --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration failed with exit code $EXIT_CODE"
            echo "Fetching migration logs..."
            aws logs tail ${{ steps.taskdef.outputs.log_group }} --prefix migrate --since 10m || true
            exit 1
          fi

          echo "Migration completed successfully"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, migrate]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API task definition and service
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_CLUSTER }}-api --query 'taskDefinition' --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ needs.build-and-push.outputs.api_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)

          # Update service
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.API_SERVICE }} --task-definition "$NEW_ARN"

      - name: Update Web task definition and service
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_CLUSTER }}-web --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ needs.build-and-push.outputs.web_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.WEB_SERVICE }} --task-definition "$NEW_ARN"

      - name: Wait for API deployment
        run: aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.API_SERVICE }}

      - name: Wait for Web deployment
        run: aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.WEB_SERVICE }}
