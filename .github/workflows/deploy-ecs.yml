name: Deploy (ECS)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: eu-west-2
  ECS_CLUSTER: care-solutions-minimal
  API_SERVICE: care-solutions-minimal-api
  WEB_SERVICE: care-solutions-minimal-web

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - run: npm ci

      - run: npm run format:check

      - run: npm run build -w packages/shared
      - run: npm run build -w apps/logger

      - run: npx prisma generate
        working-directory: apps/api

      - run: npm run lint

      - run: npm test -w apps/api -- --ci
        env:
          JWT_SECRET: test-secret
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - run: npm test -w apps/web -- --reporter=verbose

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test]
    environment: production
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      api_image: ${{ steps.images.outputs.api }}
      web_image: ${{ steps.images.outputs.web }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URLs
        id: images
        run: |
          echo "api=${{ steps.ecr.outputs.registry }}/care-solutions/care-api:${{ steps.meta.outputs.tag }}" >> $GITHUB_OUTPUT
          echo "web=${{ steps.ecr.outputs.registry }}/care-solutions/care-web:${{ steps.meta.outputs.tag }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.api }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: true
          tags: ${{ steps.images.outputs.web }}

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update API task definition and service
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_CLUSTER }}-api --query 'taskDefinition' --output json)

          # Update image in task definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ needs.build-and-push.outputs.api_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          # Register new task definition
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)

          # Update service
          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.API_SERVICE }} --task-definition "$NEW_ARN"

      - name: Update Web task definition and service
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${{ env.ECS_CLUSTER }}-web --query 'taskDefinition' --output json)

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "${{ needs.build-and-push.outputs.web_image }}" \
            '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)

          aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service ${{ env.WEB_SERVICE }} --task-definition "$NEW_ARN"

      - name: Wait for API deployment
        run: aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.API_SERVICE }}

      - name: Wait for Web deployment
        run: aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services ${{ env.WEB_SERVICE }}
