auth_enabled: false

server:
  http_listen_port: 3100
  http_listen_address: 0.0.0.0

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2025-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Tuning for a small single-binary install. Reject anything over 30 days
# old, hard-limit ingest to keep memory bounded.
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 720h # 30 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  allow_structured_metadata: true

table_manager:
  retention_deletes_enabled: true
  retention_period: 720h # 30 days

# No clustering required when running single-binary
analytics:
  reporting_enabled: false

ruler:
  alertmanager_url: ''
