apiVersion: 1

contactPoints:
  - orgId: 1
    name: ops-email
    receivers:
      - uid: ops-email
        type: email
        settings:
          addresses: ${ALERT_EMAIL_RECIPIENTS}
          singleEmail: false

policies:
  - orgId: 1
    receiver: ops-email
    group_by: [grafana_folder, alertname]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 6h
