apiVersion: 1

groups:
  - orgId: 1
    name: clinvara-api
    folder: Clinvara
    interval: 1m
    rules:
      - uid: high-error-rate
        title: API error rate above 2%
        condition: A
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus-prod
            model:
              expr: sum(rate(http_exceptions_total[5m])) / sum(rate(http_requests_total[5m])) > 0.02
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: API exception rate exceeded 2% for 5 minutes
          description: |
            More than 2% of requests are throwing exceptions in production.
            Check the Errors dashboard and recent deploys.

      - uid: stripe-webhook-signature-failures
        title: Stripe webhook signature failures
        condition: A
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-prod
            model:
              expr: sum(rate(clinvara_stripe_webhook_total{outcome="signature_failed"}[10m])) > 0
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Stripe webhook signatures failing
          description: |
            Stripe webhook signature verification has failed in the last 10 minutes.
            Either the STRIPE_WEBHOOK_SECRET env var has drifted, or someone is
            replaying old payloads. Check Stripe Dashboard → Webhooks → recent deliveries.

      - uid: trial-reminder-cron-stale
        title: Trial reminder cron has not run in 25h
        condition: A
        data:
          - refId: A
            queryType: instant
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus-prod
            model:
              expr: time() - clinvara_trial_reminder_last_run_timestamp_seconds > 90000
              intervalMs: 60000
              maxDataPoints: 1
              refId: A
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Trial reminder cron stalled
          description: |
            The trial-reminder cron last ran more than 25 hours ago. It should
            run daily at 08:00 Europe/London. Check API container restarts and
            ScheduleModule logs.

      - uid: postgres-connections-near-limit
        title: Postgres connections >80% of max
        condition: A
        data:
          - refId: A
            queryType: range
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus-prod
            model:
              expr: sum(pg_stat_activity_count) / pg_settings_max_connections > 0.8
              intervalMs: 60000
              maxDataPoints: 43200
              refId: A
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: Postgres connection pool saturated
          description: |
            More than 80% of Postgres max_connections in use for 10 minutes.
            API will start failing soon if this persists. Check for connection
            leaks (Prisma client misuse) or scale up the DB plan.
